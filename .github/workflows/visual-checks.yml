name: Visual Checks

on:
  pull_request:
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "data/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - ".github/workflows/visual-checks.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-smoke:
    name: Visual smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual smoke test
        run: npm run test:visual

  visual-captures:
    name: PR screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: visual-smoke
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate representative captures
        run: npm run test:visual:capture

      - name: Upload screenshot artifacts
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-captures-${{ github.run_number }}
          path: test-results/
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR with artifact details
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_NAME: visual-captures-${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = "<!-- visual-checks-comment -->";
            const body = `${marker}
            ## Visual Checks

            The visual smoke test passed and representative screenshots were generated for this PR.

            - Workflow run: ${process.env.RUN_URL}
            - Artifact name: \`${process.env.ARTIFACT_NAME}\`
            - Available captures:
              - \`home-light.png\`
              - \`browse-light.png\`
              - \`archive-light.png\`
              - \`random-light.png\`
              - \`settings-light.png\`
              - \`settings-dark.png\`
              - \`browse-dark.png\`
              - \`archive-dark.png\`
              - \`settings-mobile-dark.png\`

            Download the artifact from the workflow run and attach only the most representative images to the PR body if the visual change is worth highlighting.
            `;

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
