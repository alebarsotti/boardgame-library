<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ale's Board Game Library</title>
    <meta
      name="description"
      content="Coleccion de juegos de mesa con filtros avanzados, recomendaciones y seleccion aleatoria."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow" data-i18n="brandEyebrow"></p>
          <h1 class="brand-title">Ale's Board Game Library</h1>
        </div>
        <div class="topbar__controls">
          <div class="theme-switch theme-switch--topbar">
            <span class="theme-switch__label" data-i18n="themeLabel"></span>
            <div class="segmented-control segmented-control--compact" id="theme-segment-header" aria-label="Theme"></div>
          </div>
          <nav class="page-nav" id="page-nav" aria-label="Primary"></nav>
        </div>
      </header>

      <main class="page-stack">
        <section class="page-panel page-panel--hero" id="home-panel" data-page="home">
          <header class="hero">
            <div class="hero__glow"></div>
            <div class="hero__copy">
              <p class="eyebrow" data-i18n="heroEyebrow"></p>
              <h2 data-i18n="heroTitle"></h2>
              <p class="hero__lede" data-i18n="heroLede"></p>
              <div class="hero__actions">
                <button class="button button--primary" id="home-browse-action" type="button" data-i18n="exploreAction"></button>
                <button class="button button--ghost" id="home-random-action" type="button" data-i18n="openRandomAction"></button>
              </div>
            </div>
            <div class="hero__stats" id="hero-stats"></div>
          </header>

          <div class="home-grid">
            <article class="info-card">
              <p class="eyebrow" data-i18n="homeCollectionEyebrow"></p>
              <h3 data-i18n="homeCollectionTitle"></h3>
              <p data-i18n="homeCollectionBody"></p>
              <div class="home-stat-list">
                <div class="home-stat">
                  <strong id="home-owned-count"></strong>
                  <span data-i18n="heroOwned"></span>
                </div>
                <div class="home-stat">
                  <strong id="home-archive-count"></strong>
                  <span data-i18n="heroPrev"></span>
                </div>
              </div>
              <button class="button button--ghost" id="home-archive-action" type="button" data-i18n="openArchiveAction"></button>
            </article>

            <article class="info-card">
              <p class="eyebrow" data-i18n="homeUtilityEyebrow"></p>
              <h3 data-i18n="homeUtilityTitle"></h3>
              <p data-i18n="homeUtilityBody"></p>
              <div class="home-shortcuts" id="home-shortcuts"></div>
            </article>
          </div>
        </section>

        <section class="page-panel hidden" id="workspace-panel" data-page="workspace">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="workspace-eyebrow"></p>
              <h2 id="workspace-title"></h2>
              <p id="workspace-body"></p>
            </div>
            <div class="section-heading__actions">
              <button class="button button--ghost" id="workspace-settings-action" type="button" data-i18n="openSettingsAction"></button>
              <button class="button button--primary" id="workspace-random-action" type="button" data-i18n="openRandomAction"></button>
            </div>
          </div>

          <div class="layout" id="collection">
            <aside class="filters" id="filters-panel">
              <div class="filters__header">
                <div>
                  <p class="eyebrow" data-i18n="filterEyebrow"></p>
                  <h2 data-i18n="filterTitle"></h2>
                </div>
                <button class="button button--ghost button--small mobile-only" id="close-filters" type="button">
                  <span data-i18n="close"></span>
                </button>
              </div>

              <label class="field">
                <span data-i18n="searchLabel"></span>
                <input id="search-input" type="search" />
              </label>

              <div class="field-grid">
                <label class="field">
                  <span data-i18n="playersLabel"></span>
                  <div class="filter-control" id="players-filter"></div>
                </label>
                <label class="field">
                  <span data-i18n="durationLabel"></span>
                  <div class="filter-control" id="time-filter"></div>
                </label>
              </div>

              <div class="field-grid">
                <label class="field">
                  <span data-i18n="weightLabel"></span>
                  <div class="filter-control" id="weight-filter"></div>
                </label>
                <label class="field">
                  <span data-i18n="languageLabel"></span>
                  <div class="filter-control" id="language-filter"></div>
                </label>
              </div>

              <div class="field-grid">
                <label class="field">
                  <span data-i18n="bestPlayersLabel"></span>
                  <div class="filter-control" id="best-players-filter"></div>
                </label>
                <label class="field">
                  <span data-i18n="ageLabel"></span>
                  <div class="filter-control" id="age-filter"></div>
                </label>
              </div>

              <div class="field-grid">
                <label class="field">
                  <span data-i18n="sortLabel"></span>
                  <div class="filter-control" id="sort-filter"></div>
                </label>
              </div>

              <div class="recommendations-card">
                <div class="recommendations-card__header">
                  <p class="eyebrow" data-i18n="recommendEyebrow"></p>
                  <h3 data-i18n="recommendTitle"></h3>
                </div>
                <div class="chip-list" id="recommendation-chips"></div>
              </div>
            </aside>

            <section class="content">
              <div class="toolbar">
                <button class="button button--ghost mobile-only" id="open-filters" type="button">
                  <span data-i18n="openFilters"></span>
                </button>
                <div class="toolbar__summary">
                  <p class="eyebrow" data-i18n="resultsEyebrow"></p>
                  <h2 id="results-count"></h2>
                </div>
                <div class="toolbar__view-group">
                  <span class="toolbar__view-label" data-i18n="viewLabel"></span>
                  <div class="toolbar__view" id="view-filter"></div>
                </div>
                <div class="toolbar__actions">
                  <button class="button button--ghost" id="reset-filters" type="button" data-i18n="resetFilters"></button>
                  <button class="button button--primary" id="toolbar-random" type="button" data-i18n="openRandomAction"></button>
                </div>
              </div>

              <div class="active-filters" id="active-filters"></div>
              <div class="collection-grid" id="games-grid"></div>
              <div class="empty-state hidden" id="empty-state">
                <h3 data-i18n="emptyTitle"></h3>
                <p data-i18n="emptyBody"></p>
              </div>
            </section>
          </div>
        </section>

        <section class="page-panel hidden" id="random-panel" data-page="random">
          <div class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="randomPageEyebrow"></p>
              <h2 data-i18n="randomPageTitle"></h2>
              <p data-i18n="randomPageBody"></p>
            </div>
            <div class="section-heading__actions">
              <button class="button button--ghost" id="random-browse-action" type="button" data-i18n="randomPageOpenWorkspace"></button>
              <button class="button button--primary" id="random-page-trigger" type="button" data-i18n="randomAction"></button>
            </div>
          </div>
          <div class="random-page-layout">
            <div class="random-page-sidebar">
              <article class="info-card random-scope-card">
                <p class="eyebrow" data-i18n="randomSummaryTitle"></p>
                <div class="random-summary" id="random-page-summary"></div>
              </article>
              <article class="info-card random-history-card">
                <div class="random-history-card__header">
                  <div>
                    <p class="eyebrow" data-i18n="randomHistoryEyebrow"></p>
                    <h3 data-i18n="randomHistoryTitle"></h3>
                  </div>
                  <p data-i18n="randomHistoryBody"></p>
                </div>
                <div id="random-page-history"></div>
              </article>
            </div>
            <article class="random-stage" id="random-page-content"></article>
          </div>
        </section>

        <section class="page-panel hidden" id="settings-panel" data-page="settings">
          <div class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="settingsEyebrow"></p>
              <h2 data-i18n="settingsTitle"></h2>
              <p data-i18n="settingsBody"></p>
            </div>
          </div>
          <div class="settings-grid">
            <article class="info-card">
              <p class="eyebrow" data-i18n="settingsThemeEyebrow"></p>
              <h3 data-i18n="settingsThemeTitle"></h3>
              <p data-i18n="settingsThemeBody"></p>
              <div class="segmented-control" id="theme-segment-settings" aria-label="Theme"></div>
            </article>
            <article class="info-card">
              <p class="eyebrow" data-i18n="settingsLanguageEyebrow"></p>
              <h3 data-i18n="settingsLanguageTitle"></h3>
              <p data-i18n="settingsLanguageBody"></p>
              <div class="segmented-control" id="language-segment" aria-label="Language"></div>
            </article>
            <article class="info-card">
              <p class="eyebrow" data-i18n="settingsRoadmapEyebrow"></p>
              <h3 data-i18n="settingsRoadmapTitle"></h3>
              <p data-i18n="settingsRoadmapBody"></p>
            </article>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>
          <span data-i18n="poweredBy"></span>
          <a href="https://boardgamegeek.com/" target="_blank" rel="noreferrer">BoardGameGeek</a>
        </p>
      </footer>
    </div>

    <dialog class="modal" id="details-dialog">
      <button class="modal__close" id="details-close" type="button" aria-label="Close">+</button>
      <div class="modal__content" id="details-content"></div>
    </dialog>

    <template id="game-card-template">
      <article class="game-card">
        <button class="game-card__button" type="button">
          <div class="game-card__art"></div>
          <div class="game-card__body">
            <div class="game-card__heading">
              <div>
                <p class="game-card__title"></p>
                <p class="game-card__subtitle"></p>
              </div>
              <span class="game-card__badge"></span>
            </div>
            <div class="game-card__meta"></div>
            <div class="game-card__tags"></div>
          </div>
        </button>
      </article>
    </template>

    <script src="./data/games-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
